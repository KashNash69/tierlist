apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: tierlist
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: contact@cedricsazos.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: traefik
